 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AuraRoutine</title>
    
    <!-- Identity Links -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AuraRoutine">

    <style>
        :root { --primary-glow: #3182ce; --glass: rgba(255, 255, 255, 0.85); }
        body { font-family: -apple-system, sans-serif; background: #edf2f7; margin: 0; padding: 20px; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { background: var(--glass); backdrop-filter: blur(20px); width: 100%; max-width: 430px; padding: 25px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .card { margin-bottom: 20px; padding: 20px; background: white; border-radius: 24px; }
        .btn-mode { background: var(--primary-glow); color: white; border: none; padding: 15px; border-radius: 16px; font-weight: 800; width: 100%; cursor: pointer; }
        #flowOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="flowOverlay">
    <h1 id="timerDisplay" style="font-size: 4em; font-weight: 900;">25:00</h1>
    <button class="btn-mode" onclick="toggleFlow()">Exit Flow</button>
</div>

<div class="app-container">
    <h2>AuraRoutine</h2>
    <button class="btn-mode" onclick="toggleFlow()">Enter Deep Flow</button>
    <div class="card"><h3>Daily Energy Audit</h3></div>
</div>

<script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    function toggleFlow() {
        const o = document.getElementById('flowOverlay');
        o.style.display = (o.style.display === 'flex') ? 'none' : 'flex';
    }
</script>
</body>
</html>
